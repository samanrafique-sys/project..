<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
<form class="row g-3">
<div class="col-md-6">
<input type="text" class="form-control is-valid" placeholder="Name">
</div>

<div class="col-md-6">
<input type="email" class="form-control is-invalid" placeholder="Email">
</div>

<div class="col-md-6">
<select class="form-control">
<option>Select Course</option>
</select>
</div>

<div class="col-md-6">
<div class="form-check">
<input type="radio" class="form-check-input"> Male
</div>
</div>

<div class="col-md-12">
<div class="form-check">
<input type="checkbox" class="form-check-input"> Agree Terms
</div>
</div>

<div class="col-md-12">
<input type="file" class="form-control">
</div>

<button class="btn btn-success" onclick="alert('Registered Successfully')">Submit</button>
</form>
</div>

</body>
</html>
